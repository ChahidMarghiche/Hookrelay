name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        run: pytest -q

  docker:
    name: Build container image
    needs: test          # only build if lint + tests pass
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t hookrelay:${{ github.sha }} .

      # In a real deployment the next step would push to a registry (GHCR/ECR)
      # and trigger a deploy. Wiring depends on the target platform, so it's
      # intentionally left as the documented extension point.
